name: AR Sync to Softr
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run sync
        env:
          QBO_CLIENT_ID: ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET: ${{ secrets.QBO_CLIENT_SECRET }}
          QBO_REALM_ID: ${{ secrets.QBO_REALM_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          SOFTR_API_KEY: ${{ secrets.SOFTR_API_KEY }}
          SOFTR_DATABASE_ID: ${{ secrets.SOFTR_DATABASE_ID }}
          SOFTR_TABLE_ID: ${{ secrets.SOFTR_TABLE_ID }}
        run: python agent.py
